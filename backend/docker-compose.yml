version: '3.8'

services:
  db:
    image: mysql:8
    container_name: flowtv-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: flowtv
      MYSQL_USER: flowtv
      MYSQL_PASSWORD: flowtvpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build: .
    container_name: flowtv-backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: "mysql://flowtv:flowtvpassword@db:3306/flowtv"
      JWT_SECRET: "your-super-secret-jwt-key-change-this-in-production"
      JWT_REFRESH_SECRET: "your-super-secret-refresh-key-change-this-in-production"
      JWT_EXPIRES_IN: "1h"
      JWT_REFRESH_EXPIRES_IN: "7d"
      NODE_ENV: "production"
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mysql-data:
