services:
  - type: web
    name: flowtv
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && cd backend && npm install && npx prisma generate && cd .. && npm run build
    startCommand: node app.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: http://localhost:3001/api
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: flowtv-db
          property: connectionString

databases:
  - name: flowtv-db
    plan: free
    region: oregon
    databaseName: flowtv
    user: flowtv
